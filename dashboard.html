<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Dashboard - Local Business Manager</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
</head>
<body>
    <header>
        <h1>📊 Echo Dashboard</h1>
        <div id="backup-status">
            <span id="connection-status" class="status offline">🔴 Loading...</span>
            <input type="file" id="import-file" accept=".json" style="display:none">
        </div>
    </header>

    <!-- Dashboard Section -->
    <section id="dashboard-section" class="section active">
        <div class="card">
            <div class="dashboard-grid">
                <button class="dashboard-card" onclick="showSection('repairs')">
                    📱 Phone Repairs
                </button>
                <button class="dashboard-card" onclick="showSection('clients')">
                    💻 Clients
                </button>
                <button class="dashboard-card" onclick="showSection('opportunities')">
                    📊 Opportunities
                </button>
                <button class="dashboard-card" onclick="showSection('money')">
                    💰 Money Manager
                </button>
            </div>
            <div style="text-align: center; gap: 15px; display: flex; flex-wrap: wrap; justify-content: center;">
                <button onclick="exportAllData()">📥 Export Data</button>
                <button onclick="document.getElementById('import-file').click()">📤 Import Data</button>
                <button onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </section>

    <!-- Phone Repairs Section -->
    <section id="repairs-section" class="section hidden">
        <div class="card">
            <h2>📱 Phone Repairs</h2>
            <button class="back-btn" onclick="showSection('dashboard')">← Back to Dashboard</button>
            <form id="repair-form">
                <input type="text" id="repair-customer" placeholder="Customer Name" required>
                <input type="text" id="repair-model" placeholder="Phone Model" required>
                <input type="text" id="repair-issue" placeholder="Issue" required>
                <input type="number" id="repair-cost" placeholder="Cost" step="0.01" required>
                <input type="date" id="repair-date" required>
                <select id="repair-status" required>
                    <option value="">Status</option>
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                    <option value="paid">Paid</option>
                </select>
                <button type="submit">Add Repair</button>
            </form>
            <table id="repairs-table">
                <thead>
                    <tr><th>Customer</th><th>Model</th><th>Issue</th><th>Cost</th><th>Date</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <!-- Clients Section -->
    <section id="clients-section" class="section hidden">
        <div class="card">
            <h2>💻 Clients</h2>
            <button class="back-btn" onclick="showSection('dashboard')">← Back to Dashboard</button>
            <form id="client-form">
                <input type="text" id="client-business" placeholder="Business Name" required>
                <input type="tel" id="client-contact" placeholder="Contact">
                <select id="client-payment" required>
                    <option value="">Payment Status</option>
                    <option value="paid">Paid</option>
                    <option value="unpaid">Unpaid</option>
                </select>
                <select id="client-project" required>
                    <option value="">Project Status</option>
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                </select>
                <button type="submit">Add Client</button>
            </form>
            <table id="clients-table">
                <thead>
                    <tr><th>Business</th><th>Contact</th><th>Payment</th><th>Project</th><th>Actions</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <!-- Opportunities Section -->
    <section id="opportunities-section" class="section hidden">
        <div class="card">
            <h2>📊 Opportunities</h2>
            <button class="back-btn" onclick="showSection('dashboard')">← Back to Dashboard</button>
            <form id="opportunity-form">
                <input type="text" id="opp-business" placeholder="Business Name" required>
                <input type="text" id="opp-contact" placeholder="Contact">
                <select id="opp-status" required>
                    <option value="">Status</option>
                    <option value="not-contacted">Not Contacted</option>
                    <option value="demo-sent">Demo Sent</option>
                    <option value="interested">Interested</option>
                </select>
                <button type="submit">Add Opportunity</button>
            </form>
            <table id="opportunities-table">
                <thead>
                    <tr><th>Business</th><th>Contact</th><th>Status</th><th>Actions</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <!-- Money Manager Section -->
    <section id="money-section" class="section hidden">
        <div class="card">
            <h2>💰 Money Manager</h2>
            <button class="back-btn" onclick="showSection('dashboard')">← Back to Dashboard</button>
            <div class="summary">
                <p>Balance: $<span id="total-balance">0.00</span></p>
                <p class="positive">Income: $<span id="total-income">0.00</span></p>
                <p class="negative">Expenses: $<span id="total-expenses">0.00</span></p>
            </div>
            <form id="money-form">
                <select id="money-type" required>
                    <option value="">Income or Expense</option>
                    <option value="income">+ Income</option>
                    <option value="expense">- Expense</option>
                </select>
                <input type="text" id="money-desc" placeholder="Description" required>
                <input type="number" id="money-amount" placeholder="Amount" step="0.01" required>
                <input type="date" id="money-date" required>
                <button type="submit">Add Entry</button>
            </form>
            <table id="money-table">
                <thead>
                    <tr><th>Type</th><th>Description</th><th>Amount</th><th>Date</th><th>Actions</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/firebase.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
